name: CI - Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  NODE_VERSION: '22.21.0'

jobs:
  # Backend CI
  backend-ci:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_USER: sicoe_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: sicoe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sicoe-backend/package-lock.json

      - name: Install dependencies
        working-directory: ./sicoe-backend
        run: npm ci

      - name: Lint code
        working-directory: ./sicoe-backend
        run: npm run lint

      - name: Run tests
        working-directory: ./sicoe-backend
        run: npm run test
        env:
          DB_TYPE: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: sicoe_test
          DB_PASSWORD: test_password
          DB_DATABASE: sicoe_test
          JWT_SECRET: test-jwt-secret-key-for-ci-pipeline

      - name: Build application
        working-directory: ./sicoe-backend
        run: npm run build

      - name: Security audit
        working-directory: ./sicoe-backend
        run: npm audit --audit-level=high

  # Frontend CI
  frontend-ci:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sicoe-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./sicoe-frontend
        run: npm ci

      - name: Lint code
        working-directory: ./sicoe-frontend
        run: npm run lint || echo "Lint not configured, skipping..."

      - name: Type check
        working-directory: ./sicoe-frontend
        run: npm run build

      - name: Build application
        working-directory: ./sicoe-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
          VITE_APP_NAME: SICOE CI Build

      - name: Security audit
        working-directory: ./sicoe-frontend
        run: npm audit --audit-level=high

  # Docker Build Test
  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./sicoe-backend
          file: ./sicoe-backend/Dockerfile
          push: false
          tags: sicoe-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./sicoe-frontend
          file: ./sicoe-frontend/Dockerfile
          push: false
          tags: sicoe-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
