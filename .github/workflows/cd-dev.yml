name: CD - Deploy to Development

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22.21.0'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://dev-sicoe.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=dev-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./sicoe-backend
          file: ./sicoe-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=dev-

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./sicoe-frontend
          file: ./sicoe-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ secrets.DEV_API_URL }}
            VITE_APP_NAME=SICOE Development

      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /opt/sicoe
            docker compose -f docker-compose.dev.yml pull
            docker compose -f docker-compose.dev.yml up -d --remove-orphans
            docker compose -f docker-compose.dev.yml exec -T backend npm run migration:run || echo "No migrations to run"
            docker image prune -f

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment to DEV completed"
          echo "Status: ${{ job.status }}"
