
services:

  postgres:
    image: postgres:16.6-alpine
    container_name: sicoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sicoe_user
      POSTGRES_PASSWORD: sicoe_password
      POSTGRES_DB: sicoe_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sicoe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicoe_user -d sicoe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../sicoe-backend
      dockerfile: Dockerfile
    container_name: sicoe-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-local}
      PORT: 3000
      APP_NAME: SICOE Backend

      DB_TYPE: postgres
      DB_HOST: ${DB_HOST:-<azure-postgres-host>.postgres.database.azure.com}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-sicoe_dev_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-password}
      DB_DATABASE: ${DB_DATABASE:-sicoe_dev_db}
      DB_SYNCHRONIZE: false
      DB_LOGGING: ${DB_LOGGING:-true}
      DB_SSL: ${DB_SSL:-true}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}

      JWT_SECRET: ${JWT_SECRET:-sicoe-jwt-secret-key-development-2024}
      JWT_EXPIRATION: 1h
      JWT_REFRESH_EXPIRATION: 7d

      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_REDIRECT_URI: ${AZURE_AD_REDIRECT_URI:-http://localhost:3000/auth/callback}

      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      CORS_CREDENTIALS: true

      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 10

      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_MEDIA_CONTAINER: ${AZURE_STORAGE_MEDIA_CONTAINER:-media}
      AZURE_STORAGE_GENERIC_CONTAINER: ${AZURE_STORAGE_GENERIC_CONTAINER:-storage}

      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
    ports:
      - "3000:3000"
    networks:
      - sicoe-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ../sicoe-backend/src:/app/src:ro
      - media_files:/app/media

  frontend:
    build:
      context: ../sicoe-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api/v1
        VITE_ENV: development
    container_name: sicoe-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_APP_NAME: SICOE - Desenvolvimento
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sicoe-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  sicoe-network:
    name: sicoe-network
    driver: bridge

volumes:
  postgres_data:
    name: sicoe-postgres-data
    driver: local
  media_files:
    name: sicoe-media-files
    driver: local