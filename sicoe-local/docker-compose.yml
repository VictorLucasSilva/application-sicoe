services:

  postgres:
    image: postgres:16.6-alpine
    container_name: sicoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sicoe_user
      POSTGRES_PASSWORD: sicoe_password
      POSTGRES_DB: sicoe_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sicoe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicoe_user -d sicoe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../sicoe-backend
      dockerfile: Dockerfile
    container_name: sicoe-backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - sicoe-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ../sicoe-backend/src:/app/src:ro
      - media_files:/app/media

  frontend:
    build:
      context: ../sicoe-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api/v1
        VITE_ENV: development
    container_name: sicoe-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_APP_NAME: SICOE - Desenvolvimento
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sicoe-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  sicoe-network:
    name: sicoe-network
    driver: bridge

volumes:
  postgres_data:
    name: sicoe-postgres-data
    driver: local
  media_files:
    name: sicoe-media-files
    driver: local